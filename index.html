    <!----Competition Codes Legend---->
<div class="bg-slate-800 text-slate-300 text-sm flex flex-wrap gap-4 px-8 py-3 border-b border-slate-700">
    <span class="font-bold text-white">Competition Codes:</span>
    <span> <strong class="text-white">PL</strong> — Premier League</span>
    <span> <strong class="text-white">CL</strong> — Champions League</span>
    <span><strong class="text-white">BL1</strong> — Bundesliga</span>
    <span><strong class="text-white">FL1</strong> — Ligue 1</span>
    <span><strong class="text-white">SA</strong> — Serie A</span>
    <span> <strong class="text-white">PPL</strong> — Primeira Liga</span>
    <span> <strong class="text-white">PD</strong> — La Liga</span>
    <span> <strong class="text-white">CLI</strong> — Copa Libertadores</span>
</div>


<!----HOme Section---->
<section class="flex  w-80%">

    <div  class="overflow-auto hover:translate-y-1 transition delay-150 ease-in-out hover:scale-105 bg-slate-900 place-items-center rounded-xl border-double border-4 p-8 m-10 w-300 h-250">
<h2 class="text-white font-extrabold text-3xl">COMPETITION FIXTURES</h2>
        <!----Search---->
        <div class="p-7">
            <form  id="fixturesForm">
                <input class="bg-slate-800 text-white px-3 py-2 border-slate-600 border-3 rounded-xl " type="search" id="fixtures" >
                <button class="bg-white rounded-xl" id="fixturesBtn" required type="submit">Search</button>
            </form>
        </div>
        <div class="text-white"  id="displayFixtures">
            <p id="fixturesError"></p>

        </div>


    </div>
<!---column section-->
    <div class="flex flex-col gap-4">
<!--Table--->
    <div id="tableHome"   class= "overflow-auto hover:translate-y-1 transition delay-150 ease-in-out hover:scale-110 bg-slate-900 place-items-center rounded-xl border-double border-4 p-10 mt-10 h-120 w-180">
        <h2 class="text-white font-extrabold text-3xl"> COMPETITION STANDINGS</h2>
        <div class="p-7">
            <form id="standingsForm">
                <input class="text-white px-3 py-2 border-slate-600 bg-slate-800 border-3 rounded-xl " type="search" placeholder="PL for Premier League"  id="tableInput">
                <button class="bg-white rounded-xl" id="tableBtn" type="submit">Search</button>

            </form>

        </div>
        <div class="text-white" id="table">
            <p id="standingsError"></p>



        </div>






    </div>
<!---Stats-->

    <div class="overflow-auto hover:translate-y-1 transition delay-150 ease-in-out hover:scale-110 bg-slate-900 rounded-xl border-double border-4 place-items-center p-10 mb-5 w-180 h-120">
        <h2 class="text-white font-extrabold text-3xl">COMPETITION TOP SCORERS</h2>

        <!----Search---->
        <div class="p-7">
            <form id="statsForm">
                <input class="text-white px-3 py-2 border-slate-600 bg-slate-800 border-3 rounded-xl " type="search" id="stats" >
                <button class="bg-white px- py-2 rounded-xl" id="statsBtn" type="submit">Search</button>
            </form>
        </div>
        <div class="text-white"  id="displayStats">
<p id="statsError"></p>

        </div>



    </div>
    </div>

</section>
